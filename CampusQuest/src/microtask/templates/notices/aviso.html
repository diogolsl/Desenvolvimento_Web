{% extends "base.html" %}

{% block title %}Avisos - CampusQuest{% endblock %}

{% block content %}
<div class="container">
    <h1>Avisos</h1>
    <ul>
        {% if avisos %}
        {% for aviso in avisos %}
        <li>{{ aviso }}</li>
        {% endfor %}
        {% else %}
        <li>Não há avisos no momento.</li>
        {% endif %}
    </ul>
</div>
{% endblock %}
