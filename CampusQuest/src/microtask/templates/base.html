<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Campus Quest{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

    <header>
        <nav class="navbar navbar-dark bg-dark shadow-sm py-3">
            <div class="container d-flex flex-column flex-md-row align-items-center">
                
                <a class="navbar-brand fw-bold mb-3 mb-md-0 me-md-auto" href="/">Campus Quest</a>
                
                <ul class="nav nav-pills d-flex flex-row flex-nowrap gap-1 overflow-x-auto w-100 justify-content-start justify-content-md-end" style="white-space: nowrap; padding-bottom: 5px; -webkit-overflow-scrolling: touch; scrollbar-width: none;">
                    <li class="nav-item"><a class="nav-link text-white" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/missoes">Missões</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/avisos">Avisos</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/sobre">Sobre</a></li>
                </ul>

            </div>
        </nav>
    </header>

    <main class="container mt-5 mb-5">
        <div class="bg-white p-4 rounded shadow-sm">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
